<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Proxy Switcher</title>
  <style>
    :root {
      --primary: #0066ff;
      --bg: #f8fafc;
      --card: #ffffff;
    }
    
    body {
      width: 380px;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #1e2937;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #0066ff, #3388ff);
      color: white;
      padding: 20px 20px;
      font-size: 19px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .container {
      padding: 20px;
      padding-bottom: 95px;
    }

    .status {
      padding: 14px 16px;
      background: #ecfdf5;
      color: #10b981;
      border-radius: 10px;
      font-size: 14.5px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .proxy-list {
      max-height: 355px;
      overflow-y: auto;
      margin-bottom: 24px;
    }

    .proxy-item {
      background: var(--card);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px 16px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .proxy-item:hover {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(0, 102, 255, 0.15);
    }

    .proxy-item.active {
      border: 2px solid var(--primary);
      background: #f0f7ff;
    }

    .proxy-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 7px;
    }

    .proxy-info {
      font-size: 14px;
      color: #64748b;
    }

    .direct-btn {
      width: 100%;
      background: #475569;
      color: white;
      padding: 15px;
      border-radius: 10px;
      font-size: 15px;
    }

    .add-btn {
      position: fixed;
      bottom: 26px;
      right: 26px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0, 102, 255, 0.4);
      border: none;
    }

    /* Improved Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      width: 92%;
      max-width: 355px;
      border-radius: 16px;
      padding: 30px 26px 26px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal h3 {
      margin: 0 0 26px 0;
      font-size: 21px;
      text-align: center;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 15px 16px;
      margin: 11px 0;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .modal input:focus,
    .modal select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.18);
      outline: none;
    }

    .modal-buttons {
      display: flex;
      gap: 14px;
      margin-top: 30px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 10px;
      font-weight: 500;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .proxy-item {
    position: relative;
    padding-right: 70px; /* space for buttons */
  }

  .actions {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
  }

  .actions button {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 6px;
  }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header>
    <span>🔀</span>
    <span>Proxy Switcher</span>
  </header>

  <div class="container">
    <div id="status" class="status" style="display: none;">
      <span id="status-text"></span>
    </div>

    <div id="proxy-list" class="proxy-list"></div>

    <button id="direct-btn" class="direct-btn">🌐 Use Direct Connection (No Proxy)</button>
  </div>

  <button id="add-btn" class="add-btn">+</button>

  <!-- Add Proxy Modal -->
  <!-- Inside the modal -->
  <div id="add-modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title">Add New Proxy</h3>
      
      <input type="hidden" id="edit-index" value="-1">
      
      <input type="text" id="proxy-name" placeholder="Proxy Name (e.g. Residential US)">
      <input type="text" id="proxy-host" placeholder="Host or IP Address">
      <input type="number" id="proxy-port" placeholder="Port" value="8080">
      <select id="proxy-scheme">
        <option value="http">HTTP</option>
        <option value="https">HTTPS</option>
        <option value="socks5">SOCKS5</option>
      </select>
      <input type="text" id="proxy-username" placeholder="Username (optional)">
      <input type="password" id="proxy-password" placeholder="Password (optional)">

      <div class="modal-buttons">
        <button id="cancel-btn">Cancel</button>
        <button id="save-btn" class="btn-primary">Save Proxy</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
